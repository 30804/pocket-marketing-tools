<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口袋行銷工具箱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C8321A;--rl:#FAEAE7;--bg:#F0EDE8;
  --g50:#F8F6F2;--g100:#EDEAE4;--g200:#D6D2CA;--g400:#9C9890;--g600:#6B6760;--g800:#2A2825;
  --bd:#DAD6CE;--r:4px;--grn:#0F6E56;--grnl:#E1F5EE;--blu:#185FA5;--blul:#E6F1FB;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--g800);min-height:100vh;font-size:14px}
/* TOP */
.topnav{background:#fff;border-bottom:1px solid var(--bd);height:54px;display:flex;align-items:center;padding:0 1.5rem;gap:.75rem;position:sticky;top:0;z-index:200}
.logo{font-weight:900;font-size:16px;color:var(--red);display:flex;align-items:center;gap:8px;margin-right:.5rem;cursor:pointer}
.logo-sq{width:26px;height:26px;background:var(--red);border-radius:5px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
/* UPLOAD BANNER */
.upbanner{background:#fff;border-bottom:2px solid var(--red);position:relative;z-index:100;padding:.65rem 1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.upbanner-label{font-size:12px;font-weight:700;color:var(--g600);letter-spacing:.03em;white-space:nowrap}
.up-status{display:flex;align-items:center;gap:7px;font-size:12px}
.up-dot{width:8px;height:8px;border-radius:50%;background:var(--g200);flex-shrink:0}
.up-dot.ok{background:var(--grn)}
.up-dot.pulse{background:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.up-tag{display:inline-flex;align-items:center;gap:6px;background:var(--grnl);border:1px solid #9FE1CB;border-radius:var(--r);padding:.3rem .75rem;font-size:12px;color:var(--grn);font-weight:600}
.up-btn{background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:.38rem .9rem;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.up-btn:hover{background:#A52616}
.up-btn.sec{background:#fff;color:var(--g600);border:1px solid var(--bd)}.up-btn.sec:hover{border-color:var(--g800);color:var(--g800)}
/* HERO */
.hero{padding:.85rem 1.5rem 1.5rem}
.hero-eye{font-size:12px;color:var(--red);margin-bottom:.35rem;font-weight:600}
.hero-h{font-size:clamp(30px,5vw,54px);font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:.75rem}
.hero-h span{color:var(--red)}
.hero-d{font-size:12px;color:var(--g600);line-height:1.7;max-width:560px}
.hero-hr{height:1px;background:var(--bd);margin:1.5rem 0 0}
/* CONTROLS */
.ctrl{padding:1.1rem 1.5rem .8rem;display:flex;gap:.85rem;flex-direction:column}
.s-wrap{position:relative}
.s-wrap svg{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--g400)}
.s-inp{width:100%;border:1.5px solid var(--bd);border-radius:var(--r);padding:.6rem .85rem .6rem 2.2rem;font-size:13px;background:#fff;font-family:inherit;outline:none}
.s-inp:focus{border-color:var(--g800)}
.s-ct{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);font-size:11px;color:var(--g400)}
.fbtns{display:flex;gap:.35rem;flex-wrap:wrap}
.fb{border:1.5px solid var(--bd);background:#fff;padding:.28rem .75rem;font-size:11px;border-radius:2px;cursor:pointer;font-family:inherit;color:var(--g600);transition:all .1s}
.fb:hover{border-color:var(--g800);color:var(--g800)}
.fb.on{background:var(--red);border-color:var(--red);color:#fff}
/* GRID */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--bd);border-left:1px solid var(--bd);margin:0 1.5rem 3rem}
.hidden{display:none!important}
.tc{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:1.25rem;background:#fff;cursor:pointer;transition:background .1s;display:flex;flex-direction:column;min-height:185px;position:relative}
.tc:hover{background:#FDFCFB}
.tc.dim{opacity:.5;cursor:default}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.tc-num{font-size:24px;font-weight:900;line-height:1;letter-spacing:-.02em}
.badge{font-size:10px;border:1.5px solid var(--red);color:var(--red);padding:2px 7px;border-radius:2px;font-weight:700;background:var(--rl)}
.badge.s{border-color:var(--g400);color:var(--g400);background:transparent}
.tc-t{font-size:15px;font-weight:800;margin-bottom:.15rem;letter-spacing:-.01em}
.tc-en{font-size:10px;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.55rem}
.tc-d{font-size:11px;color:var(--g600);line-height:1.6;flex:1}
.tc-lnk{font-size:11px;color:var(--g800);margin-top:.75rem;font-weight:700}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.ov.open{display:flex}
.modal{background:#fff;border-radius:var(--r);width:100%;max-width:820px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.mh{padding:.9rem 1.25rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mh h2{font-size:14px;font-weight:700}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g400);line-height:1;padding:0 3px}
.mb{padding:1.25rem;flex:1}
/* FORM */
.lbl{font-size:11px;font-weight:700;color:var(--g600);margin-bottom:.3rem;display:block;letter-spacing:.03em;text-transform:uppercase}
.inp,.sel,.ta{width:100%;border:1.5px solid var(--bd);border-radius:var(--r);padding:.5rem .7rem;font-size:13px;color:var(--g800);background:#fff;font-family:inherit;outline:none;transition:border .15s}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--g800)}
.ta{resize:vertical;min-height:75px;line-height:1.6}
.fr{display:grid;gap:10px;margin-bottom:.85rem}
.fr.c2{grid-template-columns:1fr 1fr}
.fr.c3{grid-template-columns:1fr 1fr 1fr}
.btn{display:inline-flex;align-items:center;gap:6px;padding:.52rem 1rem;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .12s;font-family:inherit}
.bp{background:var(--red);color:#fff;border-color:var(--red)}.bp:hover{background:#A52616}
.bd2{background:var(--g800);color:#fff;border-color:var(--g800)}.bd2:hover{background:#1a1815}
.bo{background:#fff;color:var(--g600);border-color:var(--bd)}.bo:hover{border-color:var(--g800);color:var(--g800)}
.bgrn{background:var(--grn);color:#fff;border-color:var(--grn)}.bgrn:hover{background:#085041}
.bb{width:100%;justify-content:center}
.bsm{padding:.35rem .7rem;font-size:11px}
.btn:disabled{opacity:.38;cursor:not-allowed}
.dvd{height:1px;background:var(--bd);margin:.9rem 0}
.pb{background:var(--g100);border-radius:3px;height:4px;overflow:hidden;margin:.4rem 0}
.pf{height:100%;background:var(--red);border-radius:3px;transition:width .3s}
.al{display:flex;align-items:flex-start;gap:7px;padding:.6rem .85rem;border-radius:var(--r);font-size:12px;margin:.6rem 0;line-height:1.6}
.ae{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595}
.as2{background:var(--grnl);color:var(--grn);border:1px solid #9FE1CB}
.aw{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775}
.ai{background:var(--blul);color:var(--blu);border:1px solid #B5D4F4}
/* DZ */
.dz{border:2px dashed var(--bd);border-radius:var(--r);padding:1.5rem 1.25rem;text-align:center;cursor:pointer;background:var(--g50);position:relative;transition:all .15s}
.dz:hover,.dz.hov{border-color:var(--red);background:var(--rl)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ftag{display:inline-flex;align-items:center;gap:6px;background:var(--g100);border:1px solid var(--bd);border-radius:var(--r);padding:.35rem .7rem;font-size:12px;margin-top:.5rem}
.rbtn{background:none;border:none;cursor:pointer;color:var(--g400);font-size:16px;line-height:1;padding:0 2px;margin-left:2px}.rbtn:hover{color:var(--red)}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.85rem}
.sb{border:1.5px solid var(--bd);border-radius:var(--r);padding:.6rem .8rem;background:var(--g50)}
.sb.hi{background:#fff;border-color:var(--g800)}
.sb.r{background:var(--rl);border-color:#F09595}
.sb.g{background:var(--grnl);border-color:#9FE1CB}
.sbn{font-size:10px;color:var(--g400);margin-bottom:3px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.sbv{font-size:19px;font-weight:900;letter-spacing:-.02em}
.slg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:5px;margin-bottom:.85rem}
.sc{border:1px solid var(--bd);border-radius:var(--r);padding:.42rem .65rem;background:#fff}
.sc.m{background:var(--g50);border-color:var(--g800)}
.scn{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scc{font-size:10px;color:var(--g400);margin-top:1px}
/* SEG */
.segg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:.8rem}
.sgc{border:1.5px solid var(--bd);border-radius:var(--r);padding:.7rem;cursor:pointer;background:#fff;transition:all .1s}
.sgc:hover{border-color:var(--g800)}
.sgc.on{border-color:var(--red);background:var(--rl)}
.si{font-size:18px;margin-bottom:.3rem}
.sn{font-size:12px;font-weight:700;margin-bottom:2px}
.sgc.on .sn{color:var(--red)}
.sd{font-size:10px;color:var(--g400);line-height:1.45}
/* COPY */
.cvs{display:flex;flex-direction:column;gap:8px}
.cv{border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;background:#fff}
.ctag{padding:.35rem .8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.tA{background:var(--g100);color:var(--g600)}
.tB{background:var(--blul);color:#0C447C}
.tC{background:#EEEDFE;color:#3C3489}
.ci{padding:.7rem .85rem}
.pp{background:var(--g50);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-top:.55rem}
.pb2{background:var(--g800);color:#fff;padding:.35rem .8rem;font-size:10px;display:flex;justify-content:space-between}
.pr{display:flex;gap:9px;padding:.6rem .8rem;align-items:flex-start}
.pi{width:32px;height:32px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px;flex-shrink:0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:.45rem .65rem;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--g400);border-bottom:1.5px solid var(--bd);background:var(--g50)}
.tbl td{padding:.45rem .65rem;border-bottom:1px solid var(--g100);vertical-align:middle}
.tbl tr:hover td{background:var(--g50)}
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.pg{background:var(--grnl);color:var(--grn)}
.pr2{background:var(--rl);color:var(--red)}
.py{background:#FAEEDA;color:#854F0B}
.pb3{background:var(--blul);color:var(--blu)}
/* CHECKLIST */
.cl-item{display:flex;align-items:flex-start;gap:9px;padding:.55rem 0;border-bottom:1px solid var(--g100);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-cb{width:17px;height:17px;border:1.5px solid var(--bd);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .1s;font-size:11px}
.cl-cb.ck{background:var(--red);border-color:var(--red);color:#fff}
/* CHART */
.chart-wrap{position:relative;width:100%;margin:.65rem 0}
/* FUNNEL BAR */
.fbar-wrap{margin-bottom:.45rem}
.fbar-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.fbar-lbl{font-size:11px;font-weight:700;width:80px;flex-shrink:0}
.fbar-bg{flex:1;background:var(--g100);border-radius:3px;height:26px;overflow:hidden}
.fbar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding:0 8px;transition:width .4s}
.fbar-pct{font-size:11px;font-weight:700;color:#fff}
.fbar-num{font-size:11px;color:var(--g400);width:100px;text-align:right;flex-shrink:0}
/* REWARD TABLE */
.rtrow td{padding:.35rem .45rem;border-bottom:1px solid var(--g100);vertical-align:middle}
.rtinp{width:100%;border:1px solid var(--bd);border-radius:3px;padding:.28rem .45rem;font-size:11px;font-family:inherit;background:#fff;outline:none}
.rtinp:focus{border-color:var(--g800)}
.rtinp.code{font-family:monospace;font-weight:700;color:var(--red)}
.rtinp.reward{border-color:var(--grn);color:var(--grn);font-weight:600}
/* SECTION LABEL */
.sec-lbl{font-size:10px;font-weight:700;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.65rem}
/* WEEK HISTORY */
.week-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem .75rem;border-bottom:1px solid var(--g100);font-size:12px}
.week-row:last-child{border-bottom:none}
.week-badge{font-size:10px;font-weight:700;background:var(--g100);color:var(--g600);padding:2px 7px;border-radius:10px}
.week-row.latest .week-badge{background:var(--rl);color:var(--red)}
@media(max-width:680px){.tgrid{grid-template-columns:1fr 1fr}.fr.c2,.fr.c3{grid-template-columns:1fr}.sg{grid-template-columns:1fr 1fr}.hero,.ctrl{padding-left:1rem;padding-right:1rem}.tgrid{margin:0 0 2rem}.upbanner{padding:.55rem 1rem}}
@media(max-width:440px){.tgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo" onclick="cld()">
    <div class="logo-sq">口</div>
    行銷工具箱
  </div>
</nav>

<!-- GLOBAL UPLOAD BANNER -->
<div class="upbanner" id="upbanner">
  <span class="upbanner-label">📂 本週名單</span>
  <div class="up-status" id="up-status">
    <div class="up-dot pulse" id="up-dot"></div>
    <span id="up-msg" style="color:var(--g400)">尚未上傳名單，上傳後所有工具自動共用</span>
  </div>
  <div style="display:flex;gap:6px;margin-left:auto;align-items:center;flex-wrap:wrap">
    <span id="up-tag" style="display:none" class="up-tag">✅ <span id="up-fname"></span><span id="up-frows" style="font-size:10px;margin-left:3px"></span></span>
    <label style="cursor:pointer">
      <input type="file" id="global-fi" accept=".xlsx" style="display:none" onchange="globalLoad()">
      <span class="up-btn" id="up-main-btn">⬆ 上傳本週名單</span>
    </label>
    <button class="up-btn sec" id="up-clear-btn" style="display:none" onclick="clearGlobal()">✕ 清除</button>
  </div>
</div>

<section class="hero">
  <div class="hero-eye">口袋行銷團隊專屬，非誠勿入</div>
  <h1 class="hero-h">口袋行銷<span>工具箱</span></h1>
  <p class="hero-d">上傳一次名單，所有工具自動共用。依照工作流程排列：整理 → 篩選 → 文案 → 成效。</p>
  <div class="hero-hr"></div>
</section>

<section class="ctrl">
  <div class="s-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="s-inp" id="si" placeholder="搜尋工具..." oninput="ftl()" autocomplete="off">
    <span class="s-ct" id="sct">10 項工具</span>
  </div>
  <div class="fbtns">
    <button class="fb on" data-c="全部" onclick="sf(this)">全部</button>
    <button class="fb" data-c="整理" onclick="sf(this)">整理名單</button>
    <button class="fb" data-c="篩選" onclick="sf(this)">篩選分析</button>
    <button class="fb" data-c="文案" onclick="sf(this)">產生文案</button>
    <button class="fb" data-c="成效" onclick="sf(this)">追蹤成效</button>
    <button class="fb" data-c="設定" onclick="sf(this)">設定</button>
  </div>
</section>

<main class="tgrid" id="tgrid"></main>

<div class="ov" id="ov" onclick="ovcl(event)">
  <div class="modal">
    <div class="mh"><h2 id="mtitle">工具</h2><button class="mcl" onclick="cld()">×</button></div>
    <div class="mb" id="mbody"></div>
  </div>
</div>

<script>
/* ═══ TOOLS DATA ═══ */
const TOOLS=[
  {id:'sort',    n:'01',t:'名單整理輸出',    e:'LIST SORTER',         c:'整理',s:'上線',d:'依行銷碼自動分群，產出多工作表 Excel 下載。名單已從頂部上傳，直接整理即可。'},
  {id:'advanced',n:'02',t:'進階實動篩選',    e:'SMART FILTER',        c:'篩選',s:'上線',d:'勾選條件：入金狀態、APP 活躍度（依最後登入日）、開通市場、開戶天數，即時預覽人數並匯出精準名單，附推播建議。'},
  {id:'funnel',  n:'03',t:'新戶轉換漏斗',    e:'CONVERSION FUNNEL',   c:'篩選',s:'上線',d:'自動從本週名單帶入各階段人數，計算轉換率並視覺化漏斗，標出最大流失點。'},
  {id:'push',    n:'04',t:'Push 文案產生器',  e:'PUSH COPY GENERATOR', c:'文案',s:'上線',d:'選客戶分類與行銷碼，自動帶入對應獎勵，秒出 3 組文案。內建台美股最佳推播時段建議。'},
  {id:'perf',    n:'05',t:'Push 成效分析',   e:'PUSH PERFORMANCE',    c:'成效',s:'上線',d:'記錄每次推播成效，自動累積歷史資料，畫趨勢圖追蹤開啟率與 CTR 變化。'},
  {id:'trend',   n:'06',t:'名單趨勢分析',    e:'LIST TREND',          c:'成效',s:'上線',d:'每週上傳名單後自動記錄各分類人數，累積後自動畫折線圖，追蹤開通率變化。'},
  {id:'checklist',n:'07',t:'換檔確認清單',   e:'ASSET CHECKLIST',     c:'整理',s:'上線',d:'每月換檔作業逐項打勾確認，APP BN、彈窗、Push 素材、行銷碼一次檢查，進度自動儲存。'},
  {id:'mkcode',  n:'08',t:'行銷碼查詢表',    e:'MK CODE LOOKUP',      c:'整理',s:'上線',d:'查詢各行銷碼對應的管道、名稱與獎勵內容，支援搜尋，換檔時確認用。'},
  {id:'counter', n:'09',t:'Push 字數檢查',   e:'CHAR COUNTER',        c:'文案',s:'上線',d:'貼入文字即時顯示字元數、中英分佈，標示 iOS 截斷風險。'},
  {id:'rewards', n:'10',t:'行銷碼獎勵對照',  e:'REWARD MANAGER',      c:'設定',s:'上線',d:'設定每個行銷碼對應的獎勵內容（現金/超商卡/LINE POINT），Push 文案產生器會自動帶入，不用每次手動改。'},
];

/* ═══ SEGMENT DATA ═══ */
const SEGS=[

function daysSince(d){
  if(!d)return 999;
  const dt=d instanceof Date?d:new Date(d);
  if(isNaN(dt))return 999;
  return Math.floor((Date.now()-dt.getTime())/86400000);
}
function exportRows(rows,name){
  if(!rows||!rows.length){alert('沒有符合條件的資料');return;}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'篩選結果');
  const d=new Date();const ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  XLSX.writeFile(wb,name+'_'+ds+'.xlsx');
}

/* ═══ TREND AUTO-SAVE ═══ */
function getWeekLabel(){const d=new Date();return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+'週';}
function saveTrendWeek(rows){
  if(!rows)return;
  const seg_counts={};
  SEGS.forEach(s=>seg_counts[s.id]=0);
  rows.forEach(r=>{
    const seg=(r['分類樣態']||'').toString().trim();
    if(seg_counts.hasOwnProperty(seg))seg_counts[seg]++;
  });
  const weeks=ls('trend_weeks',[]);
  const label=getWeekLabel();
  const exists=weeks.findIndex(w=>w.label===label);
  const entry={label,total:rows.length,segs:seg_counts,ts:Date.now()};
  if(exists>=0)weeks[exists]=entry;else weeks.push(entry);
  // keep last 12 weeks
  if(weeks.length>12)weeks.splice(0,weeks.length-12);
  lss('trend_weeks',weeks);
}

    try{

function setSortP(p,l){document.getElementById('sort-prog').style.display='block';document.getElementById('sort-pl').textContent=l;document.getElementById('sort-pf').style.width=p+'%';}
function runSort(){
  if(!gRows){alert('請先上傳名單');return;}
  document.getElementById('sort-rs').style.display='none';
  document.getElementById('sort-btn').disabled=true;
  setSortP(15,'讀取中...');
  setTimeout(()=>{
    const rows=gRows;setSortP(45,'分群中...');
    const nm={};const um=[];
    for(const r of rows){const cd=(r['行銷碼']||'').toString().trim().toUpperCase();const sh=CODE_MAP[cd];if(sh){if(!nm[sh])nm[sh]=[];nm[sh].push(r['身分證']);}else um.push(r);}

    for(const[sn,ids]of Object.entries(nm)){if(!nwb.SheetNames.includes(sn)){XLSX.utils.book_append_sheet(nwb,XLSX.utils.json_to_sheet(ids.map(id=>({'身分證':id}))),sn);sc[sn]=ids.length;}}
    setSortP(95,'完成！');sortWB=nwb;

      <button class="btn bgrn bb" onclick="dlSort()">⬇ 下載整理好的 Excel</button>`;
    document.getElementById('sort-rs').style.display='block';
    document.getElementById('sort-prog').style.display='none';
    document.getElementById('sort-btn').disabled=false;
  },50);
}

  let html='<p style="font-size:12px;color:var(--g400);margin-bottom:.85rem">每月換檔作業清單，勾選後自動儲存進度。</p>';
  let total=0,done=0;
  CHECKS.forEach(cat=>{
    html+=`<div style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--g400);margin:.85rem 0 .3rem">${cat.cat}</div>`;
    cat.items.forEach((item,j)=>{
      const key=cat.cat+'_'+j;const ck=saved[key];total++;if(ck)done++;
      html+=`<div class="cl-item" onclick="toggleCk(this,'${key}')"><div class="cl-cb${ck?' ck':''}">${ck?'✓':''}</div><div style="font-size:12px;${ck?'text-decoration:line-through;color:var(--g400)':''}">${item}</div></div>`;
    });
  });
  const pct=total?Math.round(done/total*100):0;
  html=`<div style="margin-bottom:.85rem"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="font-weight:700">完成進度</span><span style="color:var(--g400)">${done}/${total}</span></div><div style="background:var(--g100);border-radius:3px;height:7px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${pct===100?'var(--grn)':'var(--red)'};border-radius:3px;transition:width .3s"></div></div></div>`+html;
  html+=`<div style="display:flex;gap:7px;margin-top:1rem"><button class="btn bp bsm" onclick="saveChk()">💾 儲存進度</button><button class="btn bo bsm" onclick="resetChk()">🗑 清除重置</button></div>`;
  return html;
}
function toggleCk(el,key){const cb=el.querySelector('.cl-cb');const lbl=el.children[1];const on=cb.classList.toggle('ck');cb.textContent=on?'✓':'';lbl.style.textDecoration=on?'line-through':'';lbl.style.color=on?'var(--g400)':'';const s=ls('chk',{});s[key]=on;lss('chk',s);}
function saveChk(){alert('進度已儲存！');}
function resetChk(){if(confirm('確定清除所有進度？')){lss('chk',{});document.getElementById('mbody').innerHTML=guiChecklist();}}

  if(tn==='緊迫感')t=t.replace(/等你(?!出手)/g,'快截止！').replace('立刻','⚡限時');
  if(tn==='輕鬆友善')t=t.replace(/！/g,'～').replace(/⚡|⏳/g,'');
  return t;
}

  const html=['A','B','C'].map((v,i)=>{
    const tt=applyTpl(tpls[v].t,reward,tn);const bt=applyTpl(tpls[v].b,reward,tn);

      </div>
      <div id="pv${v}" style="display:none"><div class="pp" style="margin-top:.55rem"><div class="pb2"><span>口袋證券</span><span>${ts}</span></div>

function pvw(v){const el=document.getElementById('pv'+v);if(!el)return;const show=el.style.display==='none';['A','B','C'].forEach(x=>{const e=document.getElementById('pv'+x);if(e)e.style.display='none';});if(show)el.style.display='block';}

  const typOpts=RWTYPES.map(t=>`<option>${t}</option>`).join('');

  <td style="padding:.32rem .45rem"><input class="rtinp" placeholder="名稱" data-f="name" style="width:82px"></td>
  <td style="padding:.32rem .45rem"><input class="rtinp reward" placeholder="例：超商卡$200" data-f="reward" style="width:100%;min-width:150px"></td>
  <td style="padding:.32rem .45rem"><select class="rtinp" style="width:78px" data-f="type">${typOpts}</select></td>
  <td style="padding:.32rem .45rem;text-align:center"><button style="background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;padding:0 2px" onclick="this.closest('tr').remove()">×</button></td>`;
  tbody.appendChild(tr);tr.querySelector('[data-f="code"]').focus();
}
function resetRwDefaults(){if(confirm('確定恢復預設資料？')){saveRewards(DEFAULT_REWARDS);renderRwTable();}}
