<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口袋行銷工具箱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C8321A;--red-light:#FAEAE7;--bg:#F0EDE8;--white:#FFF;
  --g50:#F8F6F2;--g100:#EDEAE4;--g200:#D6D2CA;--g400:#9C9890;--g600:#6B6760;--g800:#2A2825;
  --bd:#DAD6CE;--r:4px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--g800);min-height:100vh;font-size:14px}
.site-header{padding:1.25rem 2rem .75rem;display:flex;justify-content:space-between;align-items:center}
.fb-btn{border:1.5px solid var(--g800);background:none;padding:.38rem .85rem;font-size:13px;cursor:pointer;border-radius:var(--r);font-family:inherit}
.fb-btn:hover{background:var(--g800);color:#fff}
.hero{padding:.75rem 2rem 1.75rem}
.hero-eye{font-size:13px;color:var(--red);margin-bottom:.4rem;font-weight:500}
.hero-h{font-size:clamp(34px,5.5vw,60px);font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:.85rem}
.hero-h span{color:var(--red)}
.hero-d{font-size:13px;color:var(--g600);line-height:1.7;max-width:580px}
.hero-hr{height:1px;background:var(--bd);margin:1.75rem 0 0}
.ctrl{padding:1.25rem 2rem .85rem}
.s-wrap{position:relative;margin-bottom:1rem}
.s-wrap svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--g400)}
.s-inp{width:100%;border:1.5px solid var(--bd);border-radius:var(--r);padding:.65rem .9rem .65rem 2.3rem;font-size:13px;background:#fff;font-family:inherit;outline:none;transition:border .15s}
.s-inp:focus{border-color:var(--g800)}
.s-ct{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);font-size:12px;color:var(--g400)}
.fbtns{display:flex;gap:.4rem;flex-wrap:wrap}
.fb{border:1.5px solid var(--bd);background:#fff;padding:.3rem .8rem;font-size:12px;border-radius:2px;cursor:pointer;font-family:inherit;color:var(--g600);transition:all .12s}
.fb:hover{border-color:var(--g800);color:var(--g800)}
.fb.on{background:var(--red);border-color:var(--red);color:#fff}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--bd);border-left:1px solid var(--bd);margin:0 2rem 3rem}
.tc{border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:1.35rem;background:#fff;cursor:pointer;transition:background .1s;display:flex;flex-direction:column;min-height:195px;position:relative}
.tc:hover{background:#FDFCFB}
.tc.dim{opacity:.55;cursor:default}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.65rem}
.tc-num{font-size:26px;font-weight:900;line-height:1;letter-spacing:-.02em}
.badge{font-size:10px;border:1.5px solid var(--red);color:var(--red);padding:2px 7px;border-radius:2px;font-weight:700;background:var(--red-light)}
.badge.s{border-color:var(--g400);color:var(--g400);background:transparent}
.tc-t{font-size:16px;font-weight:800;margin-bottom:.15rem;letter-spacing:-.01em}
.tc-en{font-size:10px;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.6rem}
.tc-d{font-size:12px;color:var(--g600);line-height:1.65;flex:1}
.tc-lnk{font-size:12px;color:var(--g800);margin-top:.85rem;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.tc-lnk:hover{color:var(--red)}
.hidden{display:none!important}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.ov.open{display:flex}
.modal{background:#fff;border-radius:var(--r);width:100%;max-width:800px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.mh{padding:1rem 1.35rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mh h2{font-size:15px;font-weight:700}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g400);line-height:1;padding:0 3px}
.mcl:hover{color:var(--g800)}
.mb{padding:1.35rem;flex:1}
/* FORM */
.lbl{font-size:11px;font-weight:700;color:var(--g600);margin-bottom:.3rem;display:block;letter-spacing:.03em;text-transform:uppercase}
.inp,.sel,.ta{width:100%;border:1.5px solid var(--bd);border-radius:var(--r);padding:.5rem .75rem;font-size:13px;color:var(--g800);background:#fff;font-family:inherit;outline:none;transition:border .15s}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--g800)}
.ta{resize:vertical;min-height:80px;line-height:1.6}
.fr{display:grid;gap:10px;margin-bottom:.9rem}
.fr.c2{grid-template-columns:1fr 1fr}
.fr.c3{grid-template-columns:1fr 1fr 1fr}
.btn{display:inline-flex;align-items:center;gap:6px;padding:.55rem 1.1rem;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .12s;font-family:inherit}
.bp{background:var(--red);color:#fff;border-color:var(--red)}.bp:hover{background:#A52616}
.bd{background:var(--g800);color:#fff;border-color:var(--g800)}.bd:hover{background:#1a1815}
.bo{background:#fff;color:var(--g600);border-color:var(--bd)}.bo:hover{border-color:var(--g800);color:var(--g800)}
.bb{width:100%;justify-content:center}
.bsm{padding:.35rem .7rem;font-size:11px}
.btn:disabled{opacity:.38;cursor:not-allowed}
.dvd{height:1px;background:var(--bd);margin:1rem 0}
.pb{background:var(--g100);border-radius:3px;height:4px;overflow:hidden;margin:.45rem 0}
.pf{height:100%;background:var(--red);border-radius:3px;transition:width .3s}
.al{display:flex;align-items:flex-start;gap:7px;padding:.65rem .9rem;border-radius:var(--r);font-size:12px;margin:.65rem 0}
.ae{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595}
.as{background:#E1F5EE;color:#0F6E56;border:1px solid #9FE1CB}
.aw{background:#FAEEDA;color:#854F0B;border:1px solid #FAC775}
/* DROP */
.dz{border:2px dashed var(--bd);border-radius:var(--r);padding:1.75rem 1.25rem;text-align:center;cursor:pointer;background:var(--g50);position:relative;transition:all .15s}
.dz:hover,.dz.hov{border-color:var(--red);background:var(--red-light)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ftag{display:inline-flex;align-items:center;gap:6px;background:var(--g100);border:1px solid var(--bd);border-radius:var(--r);padding:.38rem .75rem;font-size:12px;margin-top:.6rem}
.rbtn{background:none;border:none;cursor:pointer;color:var(--g400);font-size:16px;line-height:1;padding:0 2px;margin-left:2px}.rbtn:hover{color:var(--red)}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.9rem}
.sb{border:1.5px solid var(--bd);border-radius:var(--r);padding:.65rem .85rem;background:var(--g50)}
.sb.hi{background:#fff;border-color:var(--g800)}
.sb.r{background:var(--red-light);border-color:#F09595}
.sbn{font-size:10px;color:var(--g400);margin-bottom:3px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.sbv{font-size:20px;font-weight:900;letter-spacing:-.02em}
.slg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px;margin-bottom:.9rem}
.sc{border:1px solid var(--bd);border-radius:var(--r);padding:.45rem .7rem;background:#fff}
.sc.m{background:var(--g50);border-color:var(--g800)}
.scn{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scc{font-size:10px;color:var(--g400);margin-top:1px}
/* SEG */
.segg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px;margin-bottom:.85rem}
.sgc{border:1.5px solid var(--bd);border-radius:var(--r);padding:.75rem;cursor:pointer;transition:all .1s;background:#fff}
.sgc:hover{border-color:var(--g800)}
.sgc.on{border-color:var(--red);background:var(--red-light)}
.si{font-size:19px;margin-bottom:.35rem}
.sn{font-size:12px;font-weight:700;margin-bottom:2px}
.sgc.on .sn{color:var(--red)}
.sd{font-size:10px;color:var(--g400);line-height:1.45}
/* COPY */
.cvs{display:flex;flex-direction:column;gap:9px}
.cv{border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;background:#fff}
.ctag{padding:.38rem .8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.tA{background:var(--g100);color:var(--g600)}
.tB{background:#E6F1FB;color:#0C447C}
.tC{background:#EEEDFE;color:#3C3489}
.ci{padding:.75rem .9rem}
.pp{background:var(--g50);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-top:.6rem}
.pb2{background:var(--g800);color:#fff;padding:.38rem .8rem;font-size:10px;display:flex;justify-content:space-between}
.pr{display:flex;gap:9px;padding:.65rem .8rem;align-items:flex-start}
.pi{width:34px;height:34px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0}
.pt{font-size:12px;font-weight:700;margin-bottom:2px}
.pm{font-size:11px;color:var(--g600);line-height:1.5}
.ptime{font-size:10px;color:var(--g400);margin-top:2px}
/* CHART */
.chart-wrap{position:relative;width:100%;margin:.75rem 0}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:.75rem}
.tbl th{text-align:left;padding:.5rem .75rem;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--g400);border-bottom:1.5px solid var(--bd);background:var(--g50)}
.tbl td{padding:.5rem .75rem;border-bottom:1px solid var(--g100);vertical-align:middle}
.tbl tr:hover td{background:var(--g50)}
.tbl tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.pill-g{background:#E1F5EE;color:#0F6E56}
.pill-r{background:var(--red-light);color:var(--red)}
.pill-y{background:#FAEEDA;color:#854F0B}
.pill-b{background:#E6F1FB;color:#185FA5}
/* GUIDE */
.gi{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:.65rem}
.gh{padding:.65rem .9rem;display:flex;align-items:center;gap:9px;background:var(--g50)}
.gbdy{padding:.65rem .9rem;background:#fff;border-top:1px solid var(--bd);font-size:12px;line-height:1.7}
/* CHECKLIST */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:.65rem 0;border-bottom:1px solid var(--g100)}
.cl-item:last-child{border-bottom:none}
.cl-cb{width:18px;height:18px;border:1.5px solid var(--bd);border-radius:3px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .1s}
.cl-cb.ck{background:var(--red);border-color:var(--red);color:#fff}
.cl-label{font-size:13px;line-height:1.5;flex:1}
.cl-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto;flex-shrink:0}
/* AB */
.ab-col{flex:1;border:1.5px solid var(--bd);border-radius:var(--r);padding:.85rem;background:#fff}
.ab-col.win{border-color:var(--red);background:var(--red-light)}
/* RESPONSIVE */
@media(max-width:700px){
  .tgrid{grid-template-columns:1fr 1fr}
  .fr.c2,.fr.c3{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr 1fr}
  .hero,.ctrl{padding-left:1rem;padding-right:1rem}
  .tgrid{margin:0 0 2rem}
}
@media(max-width:480px){.tgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="site-header">
  <button class="fb-btn" onclick="alert('請向工具負責人提供意見 🙏')">意見回饋</button>
  <span style="font-size:12px;color:var(--g600)">因為你值得</span>
</header>

<section class="hero">
  <div class="hero-eye">口袋行銷團隊專屬，非誠勿入</div>
  <h1 class="hero-h">口袋行銷<span>工具箱</span></h1>
  <p class="hero-d">零安裝的微型工具！選一則項目開始，全部在瀏覽器端完成，檔案不離開你的電腦。</p>
  <div class="hero-hr"></div>
</section>

<section class="ctrl">
  <div class="s-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="s-inp" id="si" placeholder='搜尋工具...例如「名單」「Push」「成效」「文案」' oninput="ftl()">
    <span class="s-ct" id="sct">13 項工具</span>
  </div>
  <div class="fbtns" id="fbtns">
    <button class="fb on" data-c="全部" onclick="sf(this)">全部</button>
    <button class="fb" data-c="名單" onclick="sf(this)">名單</button>
    <button class="fb" data-c="Push" onclick="sf(this)">Push 文案</button>
    <button class="fb" data-c="成效" onclick="sf(this)">成效分析</button>
    <button class="fb" data-c="策略" onclick="sf(this)">策略</button>
    <button class="fb" data-c="工具" onclick="sf(this)">小工具</button>
  </div>
</section>

<main class="tgrid" id="tgrid"></main>

<div class="ov" id="ov" onclick="clk(event)">
  <div class="modal" id="mbox">
    <div class="mh"><h2 id="mtitle">工具</h2><button class="mcl" onclick="cld()">×</button></div>
    <div class="mb" id="mbody"></div>
  </div>
</div>

<script>
/* ══ TOOLS ══ */
const TOOLS=[
  {id:'sort',n:'01',t:'新戶名單整理',e:'LIST SORTER',c:'名單',s:'上線',d:'上傳開戶未交易名單，依行銷碼自動分群，產出多工作表 Excel，一鍵下載。'},
  {id:'push',n:'02',t:'Push 文案產生器',e:'PUSH COPY GENERATOR',c:'Push',s:'上線',d:'選客戶分類與推播目標，AI 秒出 3 組風格各異的標題與內文，可預覽通知樣式。'},
  {id:'perf',n:'03',t:'Push 成效分析',e:'PUSH PERFORMANCE',c:'成效',s:'上線',d:'貼入多次推播數據（發送數、開啟數、點擊數），自動算開啟率、CTR，圖表呈現趨勢。'},
  {id:'ab',n:'04',t:'A/B 文案比較器',e:'COPY A/B TESTER',c:'Push',s:'上線',d:'貼入兩組文案，即時對照字元數、中英比例、情緒詞密度、CTA 強度，自動推薦較優版本。'},
  {id:'list_trend',n:'05',t:'名單趨勢分析',e:'LIST TREND',c:'成效',s:'上線',d:'上傳多週名單（或手動輸入各週人數），自動畫折線圖追蹤分類人數與開通率變化。'},
  {id:'checklist',n:'06',t:'換檔確認清單',e:'ASSET CHECKLIST',c:'名單',s:'上線',d:'每月換檔自動生成任務清單：APP BN、彈窗、Push 素材逐項打勾確認，可記住進度。'},
  {id:'counter',n:'07',t:'Push 字數檢查',e:'CHAR COUNTER',c:'工具',s:'上線',d:'貼入標題或內文，即時顯示字元數、中英字分佈，標示 iOS/Android 截斷風險。'},
  {id:'segguide',n:'08',t:'客戶分類手冊',e:'SEGMENT PLAYBOOK',c:'策略',s:'上線',d:'7 種新戶分類的特徵說明與推播策略建議，新人必讀，老手速查。'},
  {id:'history',n:'09',t:'Push 文案庫',e:'PUSH ARCHIVE',c:'Push',s:'上線',d:'預載歷史優秀文案，依分類篩選，一鍵複製或作為新文案的改寫基礎。'},
  {id:'timing',n:'10',t:'最佳推播時段',e:'BEST SEND TIME',c:'策略',s:'上線',d:'依客戶分類與目標，建議最佳推播星期 × 時段，附台股交易行為說明。'},
  {id:'mkcode',n:'11',t:'行銷碼查詢表',e:'MK CODE LOOKUP',c:'名單',s:'上線',d:'查詢各行銷碼對應的管道、名稱與工作表，支援搜尋，確認新行銷碼對照用。'},
  {id:'subject',n:'12',t:'主旨行產生器',e:'SUBJECT LINE GEN',c:'Push',s:'上線',d:'輸入關鍵字與優惠內容，產生 5 組 Email / LINE 主旨行，標示字元數與建議長度。'},
  {id:'funnel',n:'13',t:'新戶轉換漏斗',e:'CONVERSION FUNNEL',c:'成效',s:'上線',d:'輸入各階段人數（開戶→開通→入金→交易），自動計算各步驟轉換率並視覺化漏斗。'},
  {id:'advanced',n:'14',t:'進階實動篩選',e:'ADVANCED FILTER',c:'名單',s:'上線',d:'上傳名單後勾選條件：入金狀態、APP 活躍度、開通市場、開戶天數，一鍵匯出超精準分眾名單。'},
  {id:'deposit',n:'15',t:'入金狀態分析',e:'DEPOSIT SPLIT',c:'名單',s:'上線',d:'自動將「有入金」與「沒入金」客戶分開，產生對應的推播文案方向與個別名單。'},
  {id:'activity',n:'16',t:'活躍度溫度計',e:'ACTIVITY METER',c:'成效',s:'上線',d:'依最後登入日期計算沉睡天數，分成高活躍（3天內）、溫和（4-7天）、沉睡（7天以上）三組。'},
  {id:'market',n:'17',t:'台美雙引擎分析',e:'TW/US MARKET SPLIT',c:'名單',s:'上線',d:'比對客戶開通的市場（僅台股 / 台美雙開），產生對應推播策略與名單分組。'},
  {id:'countdown',n:'18',t:'新手大禮包倒數',e:'GIFT COUNTDOWN',c:'名單',s:'上線',d:'自動抓出「開戶滿 N 天但未交易」的急迫名單，這群人轉換率最高，精準發送倒數提醒。'},
  {id:'rewards',n:'19',t:'行銷碼獎勵對照表',e:'REWARD MANAGER',c:'名單',s:'上線',d:'預載 19 組行銷碼獎勵對照，可自行新增修改。Push 文案產生器會自動帶入對應的獎勵說法，不用每次手改。'},
];

const SEGS=[
  {id:'未開通交易',ic:'🔒',n:'未開通交易',d:'已開戶未完成開通',st:'強調「1分鐘開通」低門檻，搭配限時好禮消除猶豫。訴求：門檻極低、好禮快到期。'},
  {id:'台股APP一周內有登入',ic:'📱',n:'近期有登入',d:'一週內開APP但未下單',st:'已有使用意願，用具體誘因推最後一步。訴求：現在行動 → 馬上拿到好禮。'},
  {id:'有加入選股',ic:'⭐',n:'有加入選股',d:'用選股但尚未交易',st:'以「你追蹤的股票」為切入點，把興趣轉為行動。訴求：選好了就下單。'},
  {id:'有入金',ic:'💰',n:'有入金',d:'資金到位但未下單',st:'最接近成交！降低第一筆的心理障礙。訴求：錢都在了，只差這一下。'},

  let t=tx.replace(/\$300好禮/g, rewardLabel);
  if(tn==='緊迫感')t=t.replace('等你','快截止！');
  if(tn==='輕鬆友善')t=t.replace(/！/g,'～').replace(/⚡|⏳/g,'');
  return t;
}
function getRewardLabel(of){
  // First check if current push has a mkcode selected with a reward defined
  const mkcode = document.getElementById('pmk')?.value||'';
  if(mkcode){
    const rewards = loadRewards();
    const r = rewards.find(x=>x.code===mkcode);
    if(r && r.reward) return r.reward;
  }
  // Fallback to manual offer select
  if(of.includes('600')) return '$600折抵金';
  if(of.includes('0.08')) return '0.08%超低費率';
  if(of.includes('截止')) return '限時好禮';
  if(of.includes('超商')) return '超商禮品卡';
  if(of.includes('LINE')) return 'LINE POINT 300點';
  if(of.includes('小禮')) return '精美小禮物';
  return '$300好禮';
}
function loadRewards(){
  try{
    const stored = localStorage.getItem('rewards');
    if(stored){
      const parsed = JSON.parse(stored);
      if(parsed && parsed.length > 0) return parsed;
    }
    return DEFAULT_REWARDS.map(r=>Object.assign({},r));
  }catch(e){ return DEFAULT_REWARDS.map(r=>Object.assign({},r)); }
}

}

function addPerfRow(label='',sent='',open='',click=''){
  const div=document.createElement('div');div.className='fr c3';div.style.marginBottom='.5rem';div.style.alignItems='end';
  div.innerHTML=`<div><label class="lbl">名稱/日期</label><input class="inp" value="${label}" placeholder="例：6/10 Push"></div>

function calcPerf(){
  const rows=Array.from(document.querySelectorAll('#perfrows .fr'));
  const data=rows.map(r=>{const inps=r.querySelectorAll('input');return{label:inps[0].value||'未命名',sent:+inps[1].value||0,open:+inps[2].value||0,click:+inps[3].value||0};}).filter(d=>d.sent>0);
  if(!data.length)return;
  const avgOr=(data.reduce((a,d)=>a+d.open/d.sent,0)/data.length*100).toFixed(1);
  const avgCtr=(data.reduce((a,d)=>a+d.click/d.sent,0)/data.length*100).toFixed(1);
  const best=data.reduce((a,b)=>b.open/b.sent>a.open/a.sent?b:a);
  document.getElementById('perfstats').innerHTML=`
    <div class="sb hi"><div class="sbn">總發送</div><div class="sbv">${data.reduce((a,d)=>a+d.sent,0).toLocaleString()}</div></div>

    <div class="sb"><div class="sbn">平均 CTR</div><div class="sbv">${avgCtr}%</div></div>
    <div class="sb r"><div class="sbn">最佳推播</div><div class="sbv" style="font-size:13px;font-weight:700">${best.label}</div></div>`;
  const labels=data.map(d=>d.label);
  const orData=data.map(d=>+(d.open/d.sent*100).toFixed(1));
  const ctrData=data.map(d=>+(d.click/d.sent*100).toFixed(1));
  if(perfChart)perfChart.destroy();
  perfChart=new Chart(document.getElementById('perfChart'),{type:'bar',data:{labels,datasets:[
    {label:'開啟率 %',data:orData,backgroundColor:'rgba(200,50,26,.7)',borderRadius:3},
    {label:'CTR %',data:ctrData,backgroundColor:'rgba(200,50,26,.2)',borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
  document.getElementById('perftbl').innerHTML=`<thead><tr><th>名稱</th><th>發送數</th><th>開啟數</th><th>開啟率</th><th>點擊數</th><th>CTR</th><th>評級</th></tr></thead><tbody>`+
  data.map(d=>{const or=+(d.open/d.sent*100).toFixed(1);const ctr=+(d.click/d.sent*100).toFixed(1);const cls=or>=8?'pill-g':or>=5?'pill-y':'pill-r';const txt=or>=8?'優秀':or>=5?'正常':'偏低';
  return`<tr><td><b>${d.label}</b></td><td>${d.sent.toLocaleString()}</td><td>${d.open.toLocaleString()}</td><td><span class="pill ${cls}">${or}%</span></td><td>${d.click.toLocaleString()}</td><td>${ctr}%</td><td><span class="pill ${cls}">${txt}</span></td></tr>`;}).join('')+'</tbody>';
  document.getElementById('perfout').style.display='block';
}

function guiAB(){return`
<p style="font-size:12px;color:var(--g400);margin-bottom:.9rem">貼入兩組文案（標題+內文），系統自動分析並推薦較優版本。</p>
<div style="display:flex;gap:10px;margin-bottom:.9rem" id="abcols">
  <div class="ab-col" id="acA"><div style="font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--g400);margin-bottom:.5rem">版本 A</div>
    <div><label class="lbl">標題</label><input class="inp" id="atA" placeholder="貼入標題" style="margin-bottom:.5rem"></div>
    <div><label class="lbl">內文</label><textarea class="ta" id="abA" placeholder="貼入內文" style="min-height:70px"></textarea></div>
  </div>
  <div class="ab-col" id="acB"><div style="font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--g400);margin-bottom:.5rem">版本 B</div>
    <div><label class="lbl">標題</label><input class="inp" id="atB" placeholder="貼入標題" style="margin-bottom:.5rem"></div>
    <div><label class="lbl">內文</label><textarea class="ta" id="abB" placeholder="貼入內文" style="min-height:70px"></textarea></div>
  </div>
</div>
<button class="btn bp bb" onclick="runAB()">⚡ 開始比較</button>
<div id="about" style="display:none;margin-top:.9rem"></div>`;}
function runAB(){
  const tA=document.getElementById('atA')?.value||'';const bA=document.getElementById('abA')?.value||'';
  const tB=document.getElementById('atB')?.value||'';const bB=document.getElementById('abB')?.value||'';
  if(!tA&&!bA){alert('請填入版本 A 的文案');return;}
  const emo=/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2300}-\u{23FF}\u{1F300}-\u{1F9FF}]/gu;
  const score=(t,b)=>{let s=0;const full=t+' '+b;
    s+=full.length<50?15:full.length<80?10:5;
    s+=(full.match(emo)||[]).length*3;
    s+=(full.match(/！|💪|⚡|🔥|👇/g)||[]).length*4;
    s+=(full.match(/\$\d+|%|\d+元/g)||[]).length*3;
    s+=(full.match(/現在|立刻|馬上|今天|限時|快/g)||[]).length*2;
    s+=t.length>=8&&t.length<=20?10:0;
    return s;
  };
  const sA=score(tA,bA);const sB=score(tB,bB);
  const win=sA>=sB?'A':'B';
  ['acA','acB'].forEach(id=>document.getElementById(id)?.classList.remove('win'));
  document.getElementById('ac'+win)?.classList.add('win');
  const fmt=(t,b,s)=>`<div style="font-size:11px;color:var(--g400);margin-bottom:3px">字元數</div><div style="font-weight:700">${(t+b).length} 字</div>
  <div style="font-size:11px;color:var(--g400);margin:.4rem 0 3px">Emoji 數</div><div style="font-weight:700">${(t.match(emo)||[]).length+(b.match(emo)||[]).length}</div>
  <div style="font-size:11px;color:var(--g400);margin:.4rem 0 3px">數字/金額</div><div style="font-weight:700">${(t.match(/\$\d+|%|\d+元/g)||[]).length}</div>
  <div style="font-size:11px;color:var(--g400);margin:.4rem 0 3px">行動詞</div><div style="font-weight:700">${(t.match(/現在|立刻|馬上|今天|限時|快/g)||[]).length}</div>
  <div style="font-size:11px;color:var(--g400);margin:.4rem 0 3px">綜合分數</div><div style="font-size:20px;font-weight:900">${s}</div>`;
  document.getElementById('about').innerHTML=`
  <div class="dvd"></div>
  <div style="display:flex;gap:10px">
    <div style="flex:1;background:var(--g50);border:1.5px solid var(--bd);border-radius:var(--r);padding:.85rem">${fmt(tA,bA,sA)}</div>
    <div style="flex:1;background:var(--g50);border:1.5px solid var(--bd);border-radius:var(--r);padding:.85rem">${fmt(tB,bB,sB)}</div>
  </div>
  <div class="al as" style="margin-top:.75rem">✅ 建議採用<strong>版本 ${win}</strong>（綜合分數 ${sA>=sB?sA:sB}，字元數適中、行動詞與數字密度較高）</div>`;
  document.getElementById('about').style.display='block';
}

function parseFile(fileInputId, callback) {
  const fi = document.getElementById(fileInputId);
  if (!fi || !fi.files[0]) { callback(null, '請先上傳名單檔案'); return; }
  const f = fi.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
      callback(rows, null);
    } catch(e) { callback(null, '讀取失敗：'+e.message); }
  };
  reader.readAsArrayBuffer(f);
}

function daysSince(dateVal) {
  if (!dateVal) return 999;
  const d = dateVal instanceof Date ? dateVal : new Date(dateVal);
  if (isNaN(d)) return 999;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}

function exportRows(rows, filename) {
  if (!rows || !rows.length) { alert('沒有符合條件的資料'); return; }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), '篩選結果');
  XLSX.writeFile(wb, filename + '_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.xlsx');
}

function getAdvFiltered() {
  if (!advRows) return [];
  const dep = document.querySelector('input[name=dep]:checked')?.value || 'all';
  const act = document.querySelector('input[name=act]:checked')?.value || 'all';
  const mkt = document.querySelector('input[name=mkt]:checked')?.value || 'all';
  const days = document.querySelector('input[name=days]:checked')?.value || 'all';
  return advRows.filter(r => {
    const depV = (r['入金']||'').toString().trim();
    const loginD = daysSince(r['台股app最後登入日']);
    const hasUs = (r['美股開戶']||'').toString().trim()==='Y';
    const openD = daysSince(r['開戶日期']);
    if (dep==='Y' && depV!=='Y') return false;
    if (dep==='N' && depV!=='N') return false;
    if (act==='hot' && !(loginD<=3 && r['台股app最後登入日'])) return false;
    if (act==='warm' && !(loginD>=4 && loginD<=7)) return false;
    if (act==='cold' && loginD<=7) return false;
    if (mkt==='tw_only' && hasUs) return false;
    if (mkt==='both' && !hasUs) return false;
    if (days==='urgent' && !(openD>=20 && openD<=29)) return false;
    if (days==='mid' && !(openD>=7 && openD<=19)) return false;
    if (days==='new' && !(openD>=1 && openD<=6)) return false;
    return true;
  });
}

function previewAdv() {
  const result = getAdvFiltered();
  const dep = document.querySelector('input[name=dep]:checked')?.value || 'all';
  const act = document.querySelector('input[name=act]:checked')?.value || 'all';
  const mkt = document.querySelector('input[name=mkt]:checked')?.value || 'all';
  const days = document.querySelector('input[name=days]:checked')?.value || 'all';
  const total = advRows ? advRows.length : 0;
  const pct = total ? (result.length/total*100).toFixed(1) : 0;
  document.getElementById('adv-preview').innerHTML = result.length > 0
    ? `<div class="al as">✅ 符合條件：<strong>${result.length.toLocaleString()} 人</strong>（佔總名單 ${pct}%）</div>`
    : `<div class="al ae">⚠ 目前條件下沒有符合的客戶，請調整篩選條件</div>`;

  // show hint
  let hint = '';
  const key1 = `dep=${dep},act=${act}`;
  const key2 = `mkt=${mkt}`;
  const key3 = `days=${days}`;
  if (days==='urgent') hint = HINT_MAP['days=urgent'];
  else if (HINT_MAP[key1]) hint = HINT_MAP[key1];
  else if (mkt!=='all') hint = HINT_MAP[key2]||'';
  document.getElementById('adv-hint').innerHTML = hint
    ? `<div class="al aw">${hint}</div>` : '';
}

function exportAdv() {
  const result = getAdvFiltered();
  const dep = document.querySelector('input[name=dep]:checked')?.value || 'all';
  const act = document.querySelector('input[name=act]:checked')?.value || 'all';

  return `

<div class="dz" id="cdz" ondragover="dv(event,'cdz',1)" ondragleave="dv(event,'cdz',0)" ondrop="cdr2(event)">
  <input type="file" id="cfi" accept=".xlsx" onchange="cload()">
  <div style="font-size:28px;margin-bottom:.4rem">📂</div>
  <div style="font-size:13px;font-weight:700">點擊或拖曳上傳名單</div>
</div>

<div class="fr c2" style="margin-top:.85rem">
  <div><label class="lbl">開戶天數下限</label><input class="inp" id="dmin" type="number" value="20" min="1"></div>
  <div><label class="lbl">開戶天數上限</label><input class="inp" id="dmax" type="number" value="29" min="1"></div>
</div>
<button class="btn bp bb" onclick="crun()" id="cbtn" disabled>🚨 找出急迫名單</button>
<div id="cout" style="display:none;margin-top:1rem"></div>`;
}
let cFileRows = null;
function cdr2(e){e.preventDefault();dv(e,'cdz',0);const fi=document.getElementById('cfi');if(e.dataTransfer.files[0]){const dt=new DataTransfer();dt.items.add(e.dataTransfer.files[0]);fi.files=dt.files;}cload();}
function cload() {
  parseFile('cfi', (rows, err) => {
    if (err) { alert(err); return; }
    cFileRows = rows;
    const f = document.getElementById('cfi').files[0];
    document.getElementById('cftag').innerHTML = `<div class="ftag">📄 ${f.name} <span style="font-size:10px;color:var(--g600);margin-left:4px">（${rows.length.toLocaleString()} 筆）</span></div>`;
    document.getElementById('cftag').style.display = 'block';
    document.getElementById('cbtn').disabled = false;
  });
}
function crun() {
  if (!cFileRows) return;
  const mn = +document.getElementById('dmin').value || 20;
  const mx = +document.getElementById('dmax').value || 29;
  const result = cFileRows.filter(r => {
    const d = daysSince(r['開戶日期']);
    return d >= mn && d <= mx;
  });
  const urgentDist = {};
  result.forEach(r => {
    const d = daysSince(r['開戶日期']);
    urgentDist[d] = (urgentDist[d]||0)+1;
  });
  const distHtml = Object.entries(urgentDist).sort((a,b)=>+a[0]-+b[0]).map(([d,n])=>
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
      <span style="font-size:11px;color:var(--g400);width:55px;flex-shrink:0">第 ${d} 天</span>
      <div style="flex:1;background:var(--g100);border-radius:2px;height:14px;overflow:hidden">
        <div style="width:${Math.max(n/result.length*100,3).toFixed(1)}%;height:100%;background:var(--red);border-radius:2px"></div>
      </div>
      <span style="font-size:11px;font-weight:700;width:30px;text-align:right">${n}</span>
    </div>`).join('');
  const suggests = [
    '⏰ 「你的新戶禮只剩最後 ' + (30-mn) + ' 天，現在下單才能領到！」',
    '🚨 「限時提醒：帳戶開通 ' + mn + ' 天，$300 好禮快到期了」',
    '💰 「別讓你的帳戶只是擺著！今天完成第一筆交易，好禮馬上入袋」',
  ];
  document.getElementById('cout').innerHTML = `
  <div class="dvd"></div>
  <div class="sg">
    <div class="sb r"><div class="sbn">急迫名單</div><div class="sbv">${result.length.toLocaleString()}</div></div>
    <div class="sb"><div class="sbn">佔總名單</div><div class="sbv">${(result.length/cFileRows.length*100).toFixed(1)}%</div></div>
    <div class="sb hi"><div class="sbn">篩選範圍</div><div class="sbv" style="font-size:14px">${mn}-${mx}天</div></div>
  </div>
  <div class="al ae" style="margin-bottom:.85rem">🚨 這群人新戶禮快到期，是名單中轉換率最高的族群，建議<strong>優先排程發送</strong>，且文案必須突出截止感。</div>
  <div style="font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem">開戶天數分佈</div>
  <div style="background:var(--g50);border-radius:var(--r);padding:.75rem;margin-bottom:.85rem">${distHtml}</div>
  <div style="font-size:11px;font-weight:700;color:var(--g400);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem">建議推播文案方向</div>
  <div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:.85rem">
    ${suggests.map(s=>`<div style="padding:.45rem .75rem;background:#fff;border:1px solid var(--bd);border-radius:var(--r);border-left:3px solid var(--red);font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:8px">
      <span>${s}</span>
      <button class="btn bo bsm" style="flex-shrink:0" onclick="navigator.clipboard.writeText('${s.replace(/'/g,"\\'")}').then(()=>alert('已複製！'))">複製</button>
    </div>`).join('')}
  </div>
  <button class="btn bp bb" onclick="exportRows(window._urgentRows, '急迫名單_${mn}-${mx}天')">⬇ 下載急迫名單（${result.length} 人）</button>`;
  window._urgentRows = result;
  document.getElementById('cout').style.display = 'block';
}

function renderRewardTable(){
  const data = loadRewards();
  const tbody = document.getElementById('rtbody');
  if(!tbody) return;
  tbody.innerHTML = '';
  data.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.style.borderBottom = '1px solid var(--g100)';
    const typOpts = REWARD_TYPES.map(t=>`<option${r.type===t?' selected':''}>${t}</option>`).join('');
    const expireCls = isExpiringSoon(r.expire) ? 'style="color:var(--red);font-weight:700"' : '';
    tr.innerHTML = `
      <td style="padding:.38rem .5rem"><input style="width:95px;border:1px solid var(--bd);border-radius:3px;padding:.3rem .45rem;font-size:11px;font-family:monospace;font-weight:700;color:var(--red)" value="${r.code}" placeholder="MKXXXX" data-field="code"></td>

      <td style="padding:.38rem .5rem"><input style="width:88px;border:1px solid var(--bd);border-radius:3px;padding:.3rem .45rem;font-size:11px" ${expireCls} type="date" value="${r.expire||''}" data-field="expire"></td>
      <td style="padding:.38rem .5rem;text-align:center"><button style="background:none;border:none;cursor:pointer;color:var(--g400);font-size:16px;padding:0 3px" onclick="removeRewardRow(this)" title="刪除">×</button></td>`;
    tbody.appendChild(tr);
  });
}

function collectRewardTable(){
  const rows = document.querySelectorAll('#rtbody tr');
  return Array.from(rows).map(tr=>{
    const get = f => tr.querySelector(`[data-field="${f}"]`)?.value?.trim()||'';
    return {code:get('code').toUpperCase(), name:get('name'), reward:get('reward'), type:get('type'), desc:get('desc'), expire:get('expire')};
  }).filter(r=>r.code);
}

function saveRewardTable(){
  const data = collectRewardTable();
  saveRewards(data);
  const ok = document.getElementById('rsave-ok');
  if(ok){ ok.style.display='inline'; setTimeout(()=>ok.style.display='none', 2000); }
}

  tbody.appendChild(tr);
  tr.querySelector('[data-field="code"]').focus();
}

function removeRewardRow(btn){
  btn.closest('tr').remove();
}

function resetRewardDefaults(){
  if(!confirm('確定恢復預設資料？目前的修改會被覆蓋。')) return;
  saveRewards(DEFAULT_REWARDS);
  renderRewardTable();
}

function isExpiringSoon(dateStr){
  if(!dateStr) return false;
  const d = new Date(dateStr);
  if(isNaN(d)) return false;
  return (d - Date.now()) < 7 * 86400000;
}
